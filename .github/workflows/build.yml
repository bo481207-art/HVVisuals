name: Build EduCheat Mod

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch: # Позволяет запускать вручную из интерфейса GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Клонируем репозиторий
    - name: Checkout code
      uses: actions/checkout@v3
      
    # 2. Устанавливаем Java 8 (Forge 1.16.5 требует Java 8)
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: 'gradle'
        
    # 3. Даем права на выполнение gradlew
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # 4. Собираем проект
    - name: Build with Gradle
      run: ./gradlew build --no-daemon
      
    # 5. Загружаем артефакты (готовый .jar файл)
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: EduCheat-Mod
        path: build/libs/*.jar
        if-no-files-found: error
        
    # 6. Если это релиз, загружаем .jar в релиз
    - name: Upload to release
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/libs/educheat-*.jar
        asset_name: EduCheat-${{ github.ref_name }}.jar
        asset_content_type: application/java-archive
        
    # 7. Опубликовываем в Maven (опционально)
    - name: Publish to Maven
      if: github.event_name == 'release'
      run: ./gradlew publish --no-daemon
      
    # 8. Отправляем уведомление в Telegram (опционально)
    - name: Send Telegram notification
      if: success() && github.event_name == 'push'
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ Build successful!
          📦 Repository: ${{ github.repository }}
          🌿 Branch: ${{ github.ref_name }}
          🕐 Time: ${{ github.event.head_commit.timestamp }}
          🔗 Download: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
